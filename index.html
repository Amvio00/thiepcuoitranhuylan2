<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --green: #2d3e2d;
    --light-bg: #fdfaf7;
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: var(--light-bg);
}

/* SECTION BACKGROUND */
.details-section {
    background: url('image_21.jpg') repeat;
    padding: 80px 20px;
    text-align: center;
    color: var(--green);
}

/* ===== TITLE "LỄ TÂN HÔN" ===== */
.section-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 25px;
    position: relative;
    display: inline-block;
}

.section-title::before,
.section-title::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 50px;
    height: 1px;
    background: rgba(45, 62, 45, 0.3);
}

.section-title::before { left: -60px; }
.section-title::after { right: -60px; }

/* ===== BOX NỘI DUNG ===== */
.event-info-container {
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(4px);
    padding: 40px 20px;
    max-width: 600px;
    margin: 0 auto;
}

/* DATE */
.date-text-main {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
}

.lunar {
    font-style: italic;
    font-size: 0.9rem;
    opacity: 0.7;
    margin-bottom: 25px;
}

/* TIME GRID */
.timeline {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin: 30px 0;
}

.time-block {
    text-align: center;
}

.time-label {
    font-size: 0.75rem;
    letter-spacing: 2px;
    opacity: 0.7;
}

.time-value {
    font-size: 1.6rem;
    font-weight: 600;
    margin-top: 5px;
}

.divider {
    width: 1px;
    height: 40px;
    background: rgba(45,62,45,0.3);
}

/* LOCATION */
.location {
    margin-top: 20px;
    line-height: 1.8;
    font-size: 0.95rem;
}

.location b {
    font-size: 1.1rem;
}

.hall {
    display: block;
    margin-top: 10px;
    font-weight: 600;
}

/* COUNTDOWN */
.countdown {
    margin-top: 30px;
    font-size: 0.9rem;
}

#timer {
    display: block;
    margin-top: 5px;
    font-weight: 600;
}

/* BUTTON */
.btn {
    margin-top: 40px;
    background: var(--green);
    color: white;
    padding: 15px 40px;
    border-radius: 50px;
    border: none;
    letter-spacing: 2px;
    cursor: pointer;
}
</style>
</head>

<body>

<section class="details-section">

    <!-- TITLE OUTSIDE -->
    <div class="section-title">LỄ TÂN HÔN</div>

    <!-- CONTENT -->
    <div class="event-info-container">

        <div class="date-text-main">
            THỨ BẢY, 09 THÁNG 05 NĂM 2026
        </div>

        <div class="lunar">
            (Tức ngày 23/03 Bính Ngọ)
        </div>

        <!-- TIME -->
        <div class="timeline">
            <div class="time-block">
                <div class="time-label">ĐÓN KHÁCH</div>
                <div class="time-value">17:30</div>
            </div>

            <div class="divider"></div>

            <div class="time-block">
                <div class="time-label">KHAI TIỆC</div>
                <div class="time-value">18:30</div>
            </div>
        </div>

        <!-- LOCATION -->
        <div class="location">
            Tại Nhà hàng: <b>PAVILLON TÂN SƠN NHẤT</b><br>
            202 Đ. Hoàng Văn Thụ, Phường 9, Phú Nhuận, Hồ Chí Minh
            <span class="hall">Sảnh PEARL - Tầng 3</span>
        </div>

        <!-- COUNTDOWN -->
        <div class="countdown">
            Cùng đếm ngược:
            <span id="timer"></span>
        </div>

        <button class="btn">XÁC NHẬN THAM DỰ</button>

    </div>

</section>

<script>
const weddingDate = new Date("May 9, 2026 18:30:00").getTime();

setInterval(function () {
    const now = new Date().getTime();
    const d = weddingDate - now;

    const days = Math.floor(d / (1000 * 60 * 60 * 24));
    const hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((d % (1000 * 60)) / 1000);

    document.getElementById("timer").innerHTML =
        days + " ngày " + hours + " giờ " + minutes + " phút " + seconds + " giây";
}, 1000);
</script>

</body>
</html>
