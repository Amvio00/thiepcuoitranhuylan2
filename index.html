<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Be Vietnam Pro', sans-serif;
  overflow:hidden;
}

/* ===== INTRO ===== */
.intro {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  z-index:999;
  flex-direction:column;
}

.open-btn {
  padding:14px 30px;
  border-radius:30px;
  background:#ff8fa3;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* ===== HERO ===== */
.hero {
  height:100vh;
  background:url('background.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  color:white;
}

.overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.5), rgba(0,0,0,0));
}

/* ===== CARD ===== */
.card {
  position:relative;
  z-index:2;
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding:50px 70px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  animation:fadeUp 1.5s ease;
}

h1 {
  font-family:'Playfair Display', serif;
  font-size:52px;
  margin:0;
  text-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.date {
  font-size:26px;
  margin-top:10px;
}

.sub {
  margin-top:10px;
  font-size:18px;
}

/* ===== ANIMALS ===== */
.animals {
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:80px;
  z-index:2;
}

/* panda */
.panda-wrap {
  position:relative;
}

.panda {
  width:140px;
  animation:pandaMove 2s infinite ease-in-out;
}

/* flower */
.flower {
  position:absolute;
  width:40px;
  top:40px;
  left:80px;
  animation:giveFlower 2s infinite ease-in-out;
}

/* cat */
.cat {
  width:140px;
  animation:catReact 2s infinite ease-in-out;
}

/* animation */
@keyframes pandaMove {
  0% { transform:translateY(0); }
  50% { transform:translateY(-15px) rotate(-5deg); }
  100% { transform:translateY(0) rotate(5deg); }
}

@keyframes giveFlower {
  0% { transform:translateX(0); }
  50% { transform:translateX(40px); }
  100% { transform:translateX(0); }
}

@keyframes catReact {
  0% { transform:translateY(0); }
  50% { transform:translateY(-20px) scale(1.05); }
  100% { transform:translateY(0); }
}

/* hearts */
@keyframes heartFly {
  0% { transform:translateY(0); opacity:1; }
  100% { transform:translateY(-100px); opacity:0; }
}

/* falling */
.fall {
  position:fixed;
  top:-10px;
  width:15px;
  height:15px;
  background:white;
  border-radius:50%;
  opacity:0.7;
  animation:fall linear infinite;
}

@keyframes fall {
  to {
    transform:translateY(110vh);
  }
}

/* music button */
.music-btn {
  position:fixed;
  top:20px;
  right:20px;
  z-index:1000;
  background:#ff8fa3;
  color:white;
  border:none;
  border-radius:50%;
  width:50px;
  height:50px;
  cursor:pointer;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- intro -->
<div class="intro" id="intro">
  <h2>💌 Bạn có lời mời cưới</h2>
  <button class="open-btn" onclick="openCard()">Mở thiệp</button>
</div>

<!-- music -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<button class="music-btn" onclick="toggleMusic()">🎵</button>

<!-- hero -->
<div class="hero">

  <div class="overlay"></div>

  <div class="card">
    <h1>Minh Trân & Đức Huy</h1>
    <div class="date">09 May 2026</div>
    <div class="sub">We are getting married 💕</div>
  </div>

  <!-- panda + cat -->
  <div class="animals">
    <div class="panda-wrap">
      <img src="panda.png" class="panda">
      <img src="flower.png" class="flower">
    </div>

    <img src="cat.png" class="cat">
  </div>

</div>

<script>
function openCard() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("music").play();
}

/* hoa bay */
function createFall() {
  const f = document.createElement('div');
  f.classList.add('fall');
  f.style.left = Math.random()*100 + 'vw';
  f.style.animationDuration = (3 + Math.random()*5) + 's';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),8000);
}
setInterval(createFall,300);

/* tim bay */
function createHeart(){
  const heart = document.createElement('div');
  heart.innerHTML = '💖';
  heart.style.position = 'absolute';
  heart.style.left = '55%';
  heart.style.bottom = '120px';
  heart.style.fontSize = '20px';
  heart.style.animation = 'heartFly 2s ease forwards';

  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),2000);
}
setInterval(createHeart,2000);

/* music */
function toggleMusic(){
  const m = document.getElementById("music");
  if(m.paused) m.play();
  else m.pause();
}
</script>

</body>
</html>
