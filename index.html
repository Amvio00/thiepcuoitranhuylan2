<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Be Vietnam Pro',sans-serif;overflow-x:hidden}

/* intro */
.intro{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;color:#fff;z-index:999;flex-direction:column}
.open-btn{padding:14px 30px;border-radius:30px;background:#ff8fa3;border:none;color:#fff;font-size:18px;cursor:pointer}

/* hero */
.hero{height:100vh;background:url('background.jpg') center/cover no-repeat;display:flex;align-items:center;justify-content:center;position:relative;color:#fff}
.overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.5),rgba(0,0,0,0))}

/* card */
.card{position:relative;z-index:2;background:rgba(255,255,255,0.15);backdrop-filter:blur(15px);padding:50px 70px;border-radius:25px;text-align:center;box-shadow:0 15px 40px rgba(0,0,0,0.3);animation:fadeUp 1.5s}
h1{font-family:'Playfair Display',serif;font-size:52px;margin:0}
.date{font-size:26px;margin-top:10px}
.sub{margin-top:10px}

/* animals */
.animals{position:absolute;bottom:20px;width:100%;display:flex;justify-content:center;gap:80px}
.panda{width:140px;animation:pandaMove 2s infinite}
.cat{width:140px;animation:catMove 2s infinite}
.flower{position:absolute;width:40px;top:40px;left:80px;animation:flowerMove 2s infinite}
.panda-wrap{position:relative}

@keyframes pandaMove{0%{transform:translateY(0)}50%{transform:translateY(-15px)}100%{transform:translateY(0)}}
@keyframes catMove{0%{transform:translateY(0)}50%{transform:translateY(-20px)}100%{transform:translateY(0)}}
@keyframes flowerMove{0%{transform:translateX(0)}50%{transform:translateX(40px)}100%{transform:translateX(0)}}

/* section */
.section{padding:80px 20px;text-align:center}

/* gallery */
.gallery{display:flex;gap:15px;overflow-x:auto;padding:20px}
.gallery img{height:200px;border-radius:15px}

/* RSVP */
form{max-width:400px;margin:auto;display:flex;flex-direction:column;gap:10px}
input,textarea{padding:10px;border-radius:10px;border:1px solid #ccc}
button.submit{background:#ff8fa3;color:#fff;border:none;padding:12px;border-radius:20px}

/* map button */
.map-btn{display:inline-block;margin-top:15px;padding:12px 25px;background:#ff8fa3;color:#fff;border-radius:25px;text-decoration:none}

/* music */
.music-btn{position:fixed;top:20px;right:20px;background:#ff8fa3;color:#fff;border:none;border-radius:50%;width:50px;height:50px}

/* animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<body>

<!-- intro -->
<div class="intro" id="intro">
  <h2>💌 Bạn có lời mời cưới</h2>
  <button class="open-btn" onclick="openCard()">Mở thiệp</button>
</div>

<!-- music -->
<audio id="music" loop>
  <source src="music.mp3">
</audio>
<button class="music-btn" onclick="toggleMusic()">🎵</button>

<!-- hero -->
<div class="hero">
<div class="overlay"></div>

<div class="card">
  <h1>Minh Trân & Đức Huy</h1>
  <div class="date">09 May 2026</div>
  <div class="sub">We are getting married 💕</div>
</div>

<div class="couple">
  <img src="CR.png" class="CD.png">
</div>

<!-- album -->
<div class="section">
<h2>📸 Album cưới</h2>
<div class="gallery">
  <img src="1.jpg">
  <img src="2.jpg">
  <img src="3.jpg">
</div>
</div>

<!-- RSVP -->
<div class="section">
<h2>💌 Xác nhận tham dự</h2>
<form>
  <input type="text" placeholder="Tên của bạn">
  <input type="tel" placeholder="Số điện thoại">
  <textarea placeholder="Lời nhắn"></textarea>
  <button class="submit">Gửi</button>
</form>
</div>

<!-- MAP -->
<div class="section">
<h2>📍 Địa điểm tổ chức</h2>

<p style="font-size:20px;font-weight:600;">
PAVILLON TÂN SƠN NHẤT
</p>

<p>
202 Đ. Hoàng Văn Thụ, Phường 9, Đức Nhuận, Hồ Chí Minh
</p>

<iframe 
src="https://www.google.com/maps?q=https://maps.app.goo.gl/a9MdTMnrWKeeFWcu5&output=embed"
width="100%" height="300" style="border-radius:15px;border:0;">
</iframe>

<a href="https://maps.app.goo.gl/a9MdTMnrWKeeFWcu5" target="_blank" class="map-btn">
📍 Xem đường đi
</a>
</div>

<script>
function openCard(){
  document.getElementById('intro').style.display='none';
  document.getElementById('music').play();
}
function toggleMusic(){
  let m=document.getElementById('music');
  m.paused?m.play():m.pause();
}
</script>

</body>
</html>
