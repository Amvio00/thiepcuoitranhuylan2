<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minh Trân & Đức Huy</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Be+Vietnam+Pro:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Be Vietnam Pro',sans-serif;
  color:#333;
}

/* intro */
.intro{
  position:fixed;
  inset:0;
  background:#000;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
}

.open-btn{
  padding:14px 30px;
  border:none;
  border-radius:30px;
  background:#ff8fa3;
  color:#fff;
  font-size:18px;
}

/* hero */
.hero{
  height:100vh;
  background:url('background.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  text-align:center;
  color:#fff;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.35);
}

.hero-content{
  position:relative;
  z-index:2;
}

h1{
  font-family:'Great Vibes', cursive;
  font-size:64px;
  margin:0;
}

.date{
  margin-top:10px;
  font-size:20px;
}

.sub{
  margin-top:10px;
  font-size:16px;
}

/* couple */
.couple{
  margin-top:-80px;
  display:flex;
  justify-content:center;
  gap:20px;
}

.couple img{
  width:180px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* section */
.section{
  padding:80px 20px;
  text-align:center;
}

.title{
  font-size:28px;
  margin-bottom:20px;
}

/* gallery */
.gallery{
  display:flex;
  overflow-x:auto;
  gap:15px;
}

.gallery img{
  height:220px;
  border-radius:15px;
}

/* map */
.map iframe{
  width:100%;
  height:300px;
  border-radius:15px;
  border:0;
}

/* RSVP */
form{
  max-width:400px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input, textarea{
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

button.submit{
  background:#ff8fa3;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:20px;
}

/* music */
.music-btn{
  position:fixed;
  top:20px;
  right:20px;
  background:#ff8fa3;
  border:none;
  border-radius:50%;
  width:50px;
  height:50px;
  color:#fff;
}
</style>
</head>

<body>

<div class="intro" id="intro">
  <div class="envelope">
    <div class="flap"></div>

    <div class="letter">
      <h2>💌 Thiệp mời</h2>
      <p>Minh Trân & Đức Huy</p>
      <button class="open-btn" onclick="openCard()">Mở thiệp</button>
    </div>
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3">
</audio>
<button class="music-btn" onclick="toggleMusic()">🎵</button>

<!-- HERO -->
<div class="hero">
<div class="overlay"></div>

<div class="hero-content">
  <h1>Minh Trân & Đức Huy</h1>
  <div class="date">09 May 2026</div>
  <div class="sub">We are getting married 💕</div>
</div>

</div>

<!-- COUPLE -->
<div class="couple">
  <img src="cd.jpg">
  <img src="cr.jpg">
</div>

<!-- ALBUM -->
<div class="section">
  <div class="title">📸 Album cưới</div>
  <div class="gallery">
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
    <img src="5.jpg">
  </div>
</div>

<!-- MAP -->
<div class="section map">
  <div class="title">📍 Địa điểm tổ chức</div>

  <p><b>PAVILLON TÂN SƠN NHẤT</b></p>
  <p>202 Đ. Hoàng Văn Thụ, Phường 9, Đức Nhuận, Hồ Chí Minh</p>

  <iframe src="https://www.google.com/maps?q=https://maps.app.goo.gl/a9MdTMnrWKeeFWcu5&output=embed"></iframe>
</div>

<!-- RSVP -->
<div class="section">
  <div class="title">💌 Xác nhận tham dự</div>

  <form>
    <input placeholder="Tên của bạn">
    <input placeholder="Số điện thoại">
    <textarea placeholder="Lời nhắn"></textarea>
    <button class="submit">Gửi</button>
  </form>
</div>

<script>
function openCard(){
  document.getElementById('intro').style.display='none';
  document.getElementById('music').play();
}

function toggleMusic(){
  let m=document.getElementById('music');
  m.paused?m.play():m.pause();
}
</script>

</body>
</html>
