<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Minh Trân & Đức Huy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fdfaf7;
            --moss-green: #2d3e2d; 
            --metallic-gold: #d4af37; 
            --text-dark: #333;
        }

        body { margin: 0; padding: 0; background-color: var(--bg-color); font-family: 'Montserrat', sans-serif; overflow-x: hidden; color: var(--text-dark); }

        /* --- HERO --- */
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; 
            padding-top: 10vh; align-items: center; text-align: center; position: relative;
            background: url('anhnen1.jpg') no-repeat center center/cover;
        }
        .hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.2); z-index: 1; }
        .hero-content { position: relative; z-index: 2; color: #fff; }
        .main-title { font-family: 'Great Vibes', cursive; color: var(--metallic-gold); font-size: clamp(2.5rem, 8vw, 5rem); margin: 10px 0; }

        /* --- COUPLE --- */
        .couple-intro { background-color: var(--moss-green); padding: 80px 20px; text-align: center; color: #fff; }
        .couple-grid { display: flex; flex-direction: column; gap: 30px; align-items: center; margin-top: 40px; }
        .person-card { width: 100%; max-width: 350px; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .person-card img { width: 100%; height: 450px; object-fit: cover; display: block; }
        .person-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }

        /* --- DETAILS --- */
        .details-section { padding: 60px 20px; text-align: center; background: #fff; color: var(--moss-green); }
        .venue-name { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; margin: 20px 0; }
        .btn-direction { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--moss-green); font-weight: 700; border: 1px solid var(--moss-green); padding: 10px 20px; border-radius: 30px; margin-top: 15px; }

        /* --- ALBUM --- */
        .album-section { padding: 60px 15px; text-align: center; background: #f9f9f9; }
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 600px; margin: 0 auto; }
        .photo-item { aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .photo-item.has-more::after { 
            content: attr(data-count); position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold;
        }

        /* --- LIGHTBOX (FIXED) --- */
        #lightbox {
            display: none; position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); align-items: center; justify-content: center;
        }
        .lightbox-wrapper { position: relative; width: 90%; max-width: 800px; display: flex; align-items: center; justify-content: center; }
        #lightbox-img { max-width: 100%; max-height: 85vh; border: 3px solid #fff; border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .close-btn { position: absolute; top: -50px; right: 0; color: #fff; font-size: 40px; cursor: pointer; padding: 10px; }
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); color: white; border: none;
            font-size: 40px; padding: 15px; cursor: pointer; border-radius: 50%;
            transition: background 0.3s; z-index: 10001;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }
        .prev-btn { left: -60px; }
        .next-btn { right: -60px; }

        @media (max-width: 768px) {
            .nav-btn { padding: 10px; font-size: 30px; background: rgba(0,0,0,0.4); }
            .prev-btn { left: 5px; }
            .next-btn { right: 5px; }
            .close-btn { top: -60px; right: 10px; }
        }

        /* --- RSVP MODAL --- */
        .modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; position: relative; }
        .btn-rsvp { background: var(--moss-green); color: #fff; border: none; padding: 15px 40px; border-radius: 30px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content" data-aos="fade-up">
            <h1 class="main-title">Minh Trân & Đức Huy</h1>
            <p>09 . 05 . 2026</p>
        </div>
    </section>

    <section class="couple-intro">
        <div class="couple-grid">
            <div class="person-card" data-aos="fade-right">
                <img src="anh_chu_re.jpg" alt="Chú rể">
                <div class="person-info"><h3>ĐỨC HUY</h3></div>
            </div>
            <div class="person-card" data-aos="fade-left">
                <img src="anh_co_dau.jpg" alt="Cô dâu">
                <div class="person-info"><h3>MINH TRÂN</h3></div>
            </div>
        </div>
    </section>

    <section class="details-section">
        <div class="venue-name" data-aos="fade-up">PAVILLON TÂN SƠN NHẤT</div>
        <p data-aos="fade-up">202 Hoàng Văn Thụ, P.9, Q. Phú Nhuận, TP. HCM</p>
        <a href="https://maps.app.goo.gl/Cs2fGX1CcZW8qMZm6" target="_blank" class="btn-direction" data-aos="zoom-in">CHỈ ĐƯỜNG</a>
        <br>
        <button class="btn-rsvp" onclick="openModal()" data-aos="zoom-in">XÁC NHẬN THAM DỰ</button>
    </section>

    <section class="album-section">
        <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 30px;">ALBUM HÌNH CƯỚI</h2>
        <div class="photo-grid" id="wedding-grid">
            <!-- Grid ảnh sẽ tự sinh ra ở đây -->
        </div>
    </section>

    <!-- LIGHTBOX -->
    <div id="lightbox" onclick="closeLightbox(event)">
        <div class="lightbox-wrapper">
            <span class="close-btn" onclick="closeLightbox(event)">&times;</span>
            <button class="nav-btn prev-btn" onclick="changeImage(-1, event)">&#10094;</button>
            <img id="lightbox-img" src="" alt="Wedding Photo">
            <button class="nav-btn next-btn" onclick="changeImage(1, event)">&#10095;</button>
        </div>
    </div>

    <!-- RSVP MODAL -->
    <div id="rsvpModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color: var(--moss-green);">Xác nhận tham dự</h2>
            <form id="weddingForm" action="https://docs.google.com/forms/d/e/1FAIpSdc3WO7y75vvNHK9YRHlW9e4l0iE1jrIZKZpMJ9ejt-kuw9iw/formResponse" method="POST" target="hidden_iframe">
                <input type="text" name="entry.568495053" placeholder="Tên của bạn" required style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd;">
                <select name="entry.923450313" required style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd;">
                    <option value="Tôi sẽ đến">Tôi sẽ đến</option>
                    <option value="Rất tiếc không thể đến">Rất tiếc không thể đến</option>
                </select>
                <button type="submit" class="btn-rsvp" style="width: 100%;">GỬI XÁC NHẬN</button>
            </form>
        </div>
    </div>

    <iframe name="hidden_iframe" style="display:none;" onload="if(submitted){alert('Cảm ơn bạn đã xác nhận!'); document.getElementById('rsvpModal').style.display='none'; submitted=false;}"></iframe>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        let submitted = false;
        document.getElementById('weddingForm').onsubmit = () => { submitted = true; return true; };

        // CẤU HÌNH 10 ẢNH
        const images = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg", "8.jpg", "9.jpg", "10.jpg"];
        let currentIndex = 0;

        // TẠO GRID ẢNH
        const grid = document.getElementById('wedding-grid');
        for (let i = 0; i < 4; i++) {
            const item = document.createElement('div');
            item.className = 'photo-item';
            if (i === 3 && images.length > 4) {
                item.classList.add('has-more');
                item.setAttribute('data-count', '+' + (images.length - 4));
            }
            item.onclick = () => openLightbox(i);
            item.innerHTML = `<img src="${images[i]}" onerror="this.src='https://via.placeholder.com/400?text=Image+Missing'">`;
            grid.appendChild(item);
        }

        // LIGHTBOX FUNCTIONS
        function openLightbox(index) {
            currentIndex = index;
            const lb = document.getElementById("lightbox");
            const lbImg = document.getElementById("lightbox-img");
            lbImg.src = images[currentIndex];
            lb.style.display = "flex";
            document.body.style.overflow = "hidden"; // Chặn cuộn trang
        }

        function closeLightbox(e) {
            // Chỉ đóng nếu bấm trúng vùng nền hoặc nút X
            if (e.target.id === "lightbox" || e.target.className === "close-btn") {
                document.getElementById("lightbox").style.display = "none";
                document.body.style.overflow = "auto";
            }
        }

        function changeImage(step, e) {
            e.stopPropagation(); // Không cho sự kiện đóng lightbox chạy
            currentIndex += step;
            if (currentIndex >= images.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = images.length - 1;
            document.getElementById("lightbox-img").src = images[currentIndex];
        }

        // MODAL FUNCTIONS
        function openModal() { document.getElementById("rsvpModal").style.display = "flex"; }
        function closeModal(e) { if (e.target.id === "rsvpModal") e.target.style.display = "none"; }
    </script>
</body>
</html>
