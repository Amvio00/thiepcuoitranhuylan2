<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Be Vietnam Pro', sans-serif;
  overflow:hidden;
}

/* ===== MỞ THIỆP ===== */
.intro {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  z-index:999;
  flex-direction:column;
}

.open-btn {
  padding:14px 30px;
  border-radius:30px;
  background:#ff8fa3;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* ===== HERO ===== */
.hero {
  height:100vh;
  background:url('background.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  color:white;
}

.overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.5), rgba(0,0,0,0));
}

/* ===== CARD ===== */
.card {
  position:relative;
  z-index:2;
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding:50px 70px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  animation:fadeUp 1.5s ease;
}

h1 {
  font-family:'Playfair Display', serif;
  font-size:52px;
  margin:0;
  text-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.date {
  font-size:26px;
  margin-top:10px;
}

.sub {
  margin-top:10px;
  font-size:18px;
}

/* ===== PANDA MÈO ===== */
.animals {
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:60px;
  z-index:2;
}

.animal {
  width:140px;
  animation:play 2s infinite alternate ease-in-out;
}

.cat {
  animation-delay:1s;
}

@keyframes play {
  0% {transform:translateY(0)}
  50% {transform:translateY(-25px) rotate(-5deg)}
  100% {transform:translateY(0) rotate(5deg)}
}

/* ===== HOA BAY ===== */
.fall {
  position:fixed;
  top:-10px;
  width:15px;
  height:15px;
  background:white;
  border-radius:50%;
  opacity:0.7;
  animation:fall linear infinite;
}

@keyframes fall {
  to {
    transform:translateY(110vh);
  }
}

/* ===== ANIMATION ===== */
@keyframes fadeUp {
  from {
    opacity:0;
    transform:translateY(40px);
  }
  to {
    opacity:1;
    transform:translateY(0);
  }
}

/* ===== NÚT NHẠC ===== */
.music-btn {
  position:fixed;
  top:20px;
  right:20px;
  z-index:1000;
  background:#ff8fa3;
  color:white;
  border:none;
  border-radius:50%;
  width:50px;
  height:50px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MỞ THIỆP -->
<div class="intro" id="intro">
  <h2>💌 Bạn có lời mời cưới</h2>
  <button class="open-btn" onclick="openCard()">Mở thiệp</button>
</div>

<!-- NHẠC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<!-- HERO -->
<div class="hero">

  <div class="overlay"></div>

  <div class="card">
    <h1>Minh Trân & Đức Huy</h1>
    <div class="date">09 May 2026</div>
    <div class="sub">We are getting married 💕</div>
  </div>

  <div class="animals">
    <img src="panda.gif" class="animal">
    <img src="cat.gif" class="animal cat">
  </div>

</div>

<script>
function openCard() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("music").play();
}

/* hoa bay */
function createFall() {
  const f = document.createElement('div');
  f.classList.add('fall');
  f.style.left = Math.random()*100 + 'vw';
  f.style.animationDuration = (3 + Math.random()*5) + 's';
  document.body.appendChild(f);

  setTimeout(() => f.remove(), 8000);
}
setInterval(createFall, 300);

/* bật tắt nhạc */
function toggleMusic() {
  const m = document.getElementById("music");
  if (m.paused) m.play();
  else m.pause();
}
</script>

</body>
</html>
